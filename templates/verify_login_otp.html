{% extends 'base.html' %}

{% block title %}Verify Login OTP — Wear & Care{% endblock %}

{% block content %}
<section class="wc-section pt-0">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="text-center mb-4">
        <h1 class="h2 fw-bold wc-title mb-2">Verify Login</h1>
        <p class="wc-lead mb-0">Enter the 6-digit OTP sent to your email.</p>
      </div>

      <div class="wc-card">
        <div class="wc-card-body">
          <form method="POST" action="/verify-login-otp" novalidate>
            {% if error %}
              <div class="alert alert-danger mb-3" role="alert">{{ error }}</div>
            {% endif %}
            
            <div class="mb-3">
              <label class="form-label" for="email">Email address</label>
              <input 
                class="form-control" 
                id="email" 
                type="email" 
                name="email" 
                value="{{ email }}"
                readonly
              >
            </div>

            <div class="mb-3">
              <label class="form-label" for="otp">6-Digit OTP</label>
              <input 
                class="form-control" 
                id="otp" 
                type="text" 
                name="otp" 
                placeholder="Enter 6-digit code"
                maxlength="6"
                pattern="[0-9]{6}"
                inputmode="numeric"
                autocomplete="one-time-code"
                required
                autofocus
              >
            </div>

            <button class="btn btn-wc-primary w-100" type="submit">Verify & Login</button>

            <div class="text-center mt-4">
              <div class="small wc-muted">
                Didn't receive OTP? <a href="/login" class="link-light">Try again</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
