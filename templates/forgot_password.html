{% extends 'base.html' %}

{% block title %}Forgot Password — Wear & Care{% endblock %}

{% block content %}
<section class="wc-section pt-0">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="text-center mb-4">
        <h1 class="h2 fw-bold wc-title mb-2">Reset Password</h1>
        <p class="wc-lead mb-0">Enter your email and we'll send you an OTP to reset your password.</p>
      </div>

      <div class="wc-card">
        <div class="wc-card-body">
          <form method="POST" action="/forgot-password" novalidate>
            {% if error %}
              <div class="alert alert-danger mb-3" role="alert">{{ error }}</div>
            {% endif %}
            
            <div class="mb-3">
              <label class="form-label" for="email">Email address</label>
              <input 
                class="form-control" 
                id="email" 
                type="email" 
                name="email" 
                placeholder="your@email.com"
                autocomplete="off"
                required
                autofocus
              >
            </div>

            <button class="btn btn-wc-primary w-100" type="submit">Send Reset OTP</button>

            <div class="text-center mt-4">
              <div class="small wc-muted">
                Remember your password? <a href="/login" class="link-light">Log in instead</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
