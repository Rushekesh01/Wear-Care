<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found - Wear & Care</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
  <style>
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
      font-family: 'Inter', sans-serif;
    }
    .error-card {
      text-align: center;
      background: white;
      padding: 3rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 500px;
      width: 90%;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 0;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .error-msg {
      font-size: 1.25rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <h1 class="error-code">404</h1>
    <h3 class="mt-3 mb-2 fw-bold" style="color: var(--text-primary);">Oops! Page Not Found</h3>
    <p class="error-msg">We couldn't find the page you were looking for. It might have been moved or doesn't exist.</p>
    <a href="{{ url_for('home') }}" class="btn btn-wc-primary btn-lg w-100">🏠 Return to Home</a>
  </div>
</body>
</html>
