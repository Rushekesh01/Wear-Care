{% extends 'base.html' %}

{% block title %}Verify Email — Wear & Care{% endblock %}

{% block content %}
<section class="wc-section pt-0">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="text-center mb-4">
        <h1 class="h2 fw-bold wc-title mb-2">Verify your email</h1>
        <p class="wc-lead mb-0">We sent a 6-digit OTP to your email. Please enter it below to confirm your account.</p>
      </div>

      <div class="wc-card">
        <div class="wc-card-body">
          <form method="POST" action="/verify-otp" novalidate>
            {% if error %}
              <div class="alert alert-danger mb-3" role="alert">{{ error }}</div>
            {% endif %}
            
            <input type="hidden" name="email" value="{{ request.args.get('email', '') }}">

            <div class="mb-3">
              <label class="form-label" for="otp">6-Digit Code</label>
              <input 
                class="form-control text-center fs-4 letter-spacing-2" 
                id="otp" 
                type="text" 
                name="otp" 
                placeholder="000000"
                maxlength="6"
                autocomplete="off"
                required
                autofocus
              >
            </div>

            <button class="btn btn-wc-primary w-100" type="submit">Verify & Login</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
